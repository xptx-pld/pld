version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: dormitory_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: dormitory_autonomy_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - dormitory_network

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dormitory_api
    environment:
      DATABASE_URL: mysql+mysqlconnector://root:${DB_PASSWORD:-password}@mysql:3306/dormitory_autonomy_db
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      DEBUG: "false"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-to-a-random-string}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - dormitory_network

  redis:
    image: redis:7-alpine
    container_name: dormitory_redis
    networks:
      - dormitory_network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: dormitory_web
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - fastapi
    networks:
      - dormitory_network

volumes:
  mysql_data:
  uploads_data:

networks:
  dormitory_network:
    driver: bridge
