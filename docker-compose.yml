version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: dormitory_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: dormitory_autonomy_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - dormitory_network

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dormitory_api
    environment:
      DATABASE_URL: mysql+mysqlconnector://root:password@mysql:3306/dormitory_autonomy_db
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - dormitory_network

volumes:
  mysql_data:

networks:
  dormitory_network:
    driver: bridge
